version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: src/api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - NOVA_API_KEY=${NOVA_API_KEY}
      - NOVA_ORCHESTRATOR_AGENT_ID=${NOVA_ORCHESTRATOR_AGENT_ID}
      - NOVA_SOS_AGENT_ID=${NOVA_SOS_AGENT_ID}
      - NOVA_GENERAL_AGENT_ID=${NOVA_GENERAL_AGENT_ID}
      - NOVA_VOICE_AGENT_ID=${NOVA_VOICE_AGENT_ID}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN}
      - AWS_REGION=${AWS_REGION}
      - SNS_SOS_TOPIC_ARN=${SNS_SOS_TOPIC_ARN}
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - default
      - news-alert-network

networks:
  default:
    name: refugeereach-api-network
  news-alert-network:
    external: true
    name: news-alert-network
