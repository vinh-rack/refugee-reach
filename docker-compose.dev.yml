version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: src/api/Dockerfile
    container_name: refugeereach-api-dev
    ports:
      - "8000:8000"
    environment:
      - NOVA_API_KEY=${NOVA_API_KEY}
      - NOVA_ORCHESTRATOR_AGENT_ID=${NOVA_ORCHESTRATOR_AGENT_ID}
      - NOVA_SOS_AGENT_ID=${NOVA_SOS_AGENT_ID}
      - NOVA_GENERAL_AGENT_ID=${NOVA_GENERAL_AGENT_ID}
      - NOVA_VOICE_AGENT_ID=${NOVA_VOICE_AGENT_ID}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN}
      - AWS_REGION=${AWS_REGION}
      - SNS_SOS_TOPIC_ARN=${SNS_SOS_TOPIC_ARN}
    env_file:
      - .env
    volumes:
      - ./src:/app/src
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    networks:
      - default
      - news-alert-network

  ui:
    image: node:20-alpine
    container_name: refugeereach-ui-dev
    working_dir: /app
    ports:
      - "0.0.0.0:5173:5173"
    volumes:
      - ./src/ui:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - api
    restart: unless-stopped

networks:
  default:
    name: refugeereach-network-dev
  news-alert-network:
    external: true
    name: news-alert-network
