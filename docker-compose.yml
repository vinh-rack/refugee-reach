version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: src/api/Dockerfile
    container_name: refugeereach-api
    ports:
      - "8000:8000"
    environment:
      - NOVA_API_KEY=${NOVA_API_KEY}
      - NOVA_VOICE_AGENT_ID=${NOVA_VOICE_AGENT_ID}
      - OPENROUTESERVICE_API_KEY=${OPENROUTESERVICE_API_KEY}
    env_file:
      - .env
    volumes:
      - ./src:/app/src
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  ui:
    build:
      context: src/ui
      dockerfile: Dockerfile
    container_name: refugeereach-ui
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  default:
    name: refugeereach-network
